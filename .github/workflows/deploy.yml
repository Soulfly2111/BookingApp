name: Deploy Band Booking

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile app
        run: python -m py_compile app.py

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "app.py,requirements.txt,assets,systemd"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'band-booking' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DEPLOY_PATH,SERVICE_NAME
          script: |
            set -e

            cd "$DEPLOY_PATH"
            python3 -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r requirements.txt

            mkdir -p data

            if [ -f systemd/band-booking.service ]; then
              sed "s#/var/www/band-booking#${DEPLOY_PATH}#g" systemd/band-booking.service > "/tmp/${SERVICE_NAME}.service"
              sudo cp "/tmp/${SERVICE_NAME}.service" "/etc/systemd/system/${SERVICE_NAME}.service"
              sudo systemctl daemon-reload
              sudo systemctl enable "${SERVICE_NAME}"
            fi

            sudo chown -R www-data:www-data "$DEPLOY_PATH/data"
            sudo systemctl restart "${SERVICE_NAME}"
            sudo systemctl --no-pager --full status "${SERVICE_NAME}"
